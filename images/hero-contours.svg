<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" preserveAspectRatio="none" fill="none">
  <g stroke-linecap="round" fill="none">
    <!-- Varied contour lines: mix of long single swells and choppier double waves,
         non-uniform spacing + amplitudes, so the field reads organic not ruled.
         Tile is seamless across x=0..720 (every line returns to its baseline). -->
