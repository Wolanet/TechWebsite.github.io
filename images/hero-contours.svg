    <path d="M0,150 C240,108 480,176 720,150" stroke="#22d3ee" stroke-width="1.5" opacity="0.13"/>
    <path d="M0,232 C180,210 540,256 720,232" stroke="#58a6ff" stroke-width="2.3" opacity="0.12"/>
    <path d="M0,322 C120,300 240,348 360,322 C480,296 600,346 720,322" stroke="#3b82f6" stroke-width="1.4" opacity="0.12"/>
    <path d="M0,408 C240,356 480,452 720,408" stroke="#22d3ee" stroke-width="1.8" opacity="0.10"/>
    <path d="M0,498 C160,480 560,514 720,498" stroke="#58a6ff" stroke-width="1.5" opacity="0.10"/>
    <path d="M0,582 C120,560 240,606 360,582 C480,558 600,606 720,582" stroke="#3b82f6" stroke-width="1.7" opacity="0.09"/>
    <path d="M0,668 C240,612 480,716 720,668" stroke="#22d3ee" stroke-width="2" opacity="0.08"/>
    <path d="M0,754 C180,736 540,772 720,754" stroke="#58a6ff" stroke-width="1.4" opacity="0.07"/>
    <path d="M0,836 C120,816 240,858 360,836 C480,814 600,858 720,836" stroke="#3b82f6" stroke-width="1.6" opacity="0.06"/>
  </g>
</svg>
