<svg viewBox="0 0 300 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stylized wave">
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Outer crest + curling claw -->
    <path d="M8 212 C70 204 116 211 156 184 C198 156 224 116 224 82 C224 54 204 36 180 42 C160 47 152 68 168 78 C178 84 192 79 192 67"
          stroke="#dde4ec" stroke-width="3.2" opacity="0.9"/>
    <!-- Second swell -->
    <path d="M16 222 C74 214 116 221 154 197 C192 173 216 137 220 104"
          stroke="#c2cbd6" stroke-width="2.6" opacity="0.8"/>
    <!-- Third swell -->
    <path d="M26 231 C80 224 118 230 154 209 C188 188 210 156 216 124"
          stroke="#aab4c1" stroke-width="2.2" opacity="0.7"/>
    <!-- Inner trough line -->
    <path d="M40 236 C86 231 120 235 150 219 C180 203 200 176 208 150"
          stroke="#9aa5b3" stroke-width="1.8" opacity="0.55"/>
    <!-- Curl hook accents -->
    <path d="M196 70 C206 64 214 70 210 80 C207 88 197 88 194 80"
          stroke="#dde4ec" stroke-width="2.2" opacity="0.85"/>
  </g>
  <!-- Foam droplets around the crest -->
  <g fill="#eaeff5">
    <circle cx="184" cy="46" r="6" opacity="0.92"/>
    <circle cx="202" cy="56" r="4.2" opacity="0.8"/>
    <circle cx="170" cy="60" r="4" opacity="0.78"/>
    <circle cx="214" cy="72" r="3.4" opacity="0.7"/>
    <circle cx="190" cy="34" r="3" opacity="0.7"/>
    <circle cx="160" cy="50" r="2.6" opacity="0.6"/>
    <circle cx="226" cy="60" r="2.4" opacity="0.55"/>
  </g>
  <!-- Light spray dots -->
  <g fill="#cdd6e0">
    <circle cx="206" cy="30" r="1.8" opacity="0.6"/>
    <circle cx="222" cy="44" r="1.6" opacity="0.55"/>
    <circle cx="176" cy="26" r="1.6" opacity="0.5"/>
    <circle cx="150" cy="40" r="1.4" opacity="0.45"/>
    <circle cx="234" cy="78" r="1.5" opacity="0.45"/>
  </g>
</svg>
